name: CI - Auth Service

on:
  push:
    branches: [ main ]
    paths:
      - 'services/auth/**'
      - '.github/workflows/ci-auth.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cinema-app-auth

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          file: ./services/auth/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  deploy:
     needs: build-and-push
     runs-on: self-hosted
     steps:
       - name: Checkout
         uses: actions/checkout@v4
       - name: Set image and roll out
         run: |
           kubectl set image deployment/auth-service auth-service=${{ env.IMAGE_NAME }}:${{ github.sha }} -n cinema-app
           kubectl rollout status deployment/auth-service -n cinema-app