apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: cinema-app
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: cinema-app
data:
  init-replicaset.js: |
    let retries = 30;
    while (retries > 0) {
      try {
        db.adminCommand({ ping: 1 });
        break;
      } catch (e) {
        retries--;
        sleep(2000);
      }
    }

    let alreadyInitialised = false;
    try {
      const status = rs.status();
      alreadyInitialised = (status.ok === 1);
    } catch (e) {
      alreadyInitialised = false;
    }

    if (!alreadyInitialised) {
      print("Initialising replica set rs0...");
      rs.initiate({
        _id: "rs0",
        members: [
          { _id: 0, host: "mongodb-0.mongodb.cinema-app.svc.cluster.local:27017", priority: 2 },
          { _id: 1, host: "mongodb-1.mongodb.cinema-app.svc.cluster.local:27017", priority: 1 },
          { _id: 2, host: "mongodb-2.mongodb.cinema-app.svc.cluster.local:27017", priority: 1 }
        ]
      });
      print("Replica set initialised.");
    } else {
      print("Replica set already initialised, skipping.");
    }
---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: cinema-app
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 60

      initContainers:
        - name: init-replicaset
          image: busybox
          command: [ "sh", "-c", "echo 'Init container done'" ]
      containers:
        - name: mongodb
          image: mongo:7
          args:
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

      volumes:
        - name: init-scripts
          configMap:
            name: mongodb-init-script

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
