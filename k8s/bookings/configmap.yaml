apiVersion: v1
kind: ConfigMap
metadata:
  name: bookings-config
  namespace: cinema-app
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  MongoDb__ConnectionString: "mongodb://mongodb-0.mongodb:27017,mongodb-1.mongodb:27017,mongodb-2.mongodb:27017/?replicaSet=rs0&readPreference=primaryPreferred"
  MongoDb__DatabaseName: "bookings_db"
  Redis__ConnectionString: "redis:6379"
  RabbitMq__Host: "rabbitmq"
  RabbitMq__Port: "5672"
  RabbitMq__Username: "guest"
  RabbitMq__Password: "guest"
  SeatLock__TtlSeconds: "300"
